name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    name: Frontend – lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Oocw.Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Oocw.Frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend:
    name: Backend – build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore Oocw.Backend/Oocw.Backend.csproj
      - name: Build
        run: dotnet build Oocw.Backend/Oocw.Backend.csproj --no-restore -c Release

  docker:
    name: Docker – build image
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: openocw:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
